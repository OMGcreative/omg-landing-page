<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-19766333-1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'UA-19766333-1');
    </script>
    <!-- Default title (overridden per-page via React) -->
    <title>OMG! Creative — Deliberately Different Brand & Digital</title>

    <!-- Default meta description (overridden per-page) -->
    <meta
      name="description"
      content="OMG! Creative builds deliberately different brand and digital assets that lead, perform, and drive growth."
    />

    <!-- Canonical (update per-page via React) -->
    <link rel="canonical" href="https://omgcreative.com.au/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OMG! Creative" />
    <meta
      property="og:title"
      content="OMG! Creative — Deliberately Different Brand & Digital"
    />
    <meta
      property="og:description"
      content="We build brand and digital assets that lead, perform, and drive growth."
    />
    <meta property="og:url" content="https://omgcreative.com.au/" />
    <meta
      property="og:image"
      content="https://omgcreative.com.au/og-image.jpg"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OMG! Creative" />
    <meta
      name="twitter:description"
      content="We build brand and digital assets that lead, perform, and drive growth."
    />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme colour (matches dark bg) -->
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Favicon (replace with actual favicon path) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
